version: "3.9"

services:
  jupyterlab:
    build: .
    container_name: jupyterlab-voice-cu118
    ports: 
      - "2020:8888"
    volumes:
      - ./workspace:/workspace
      - ./runs:/runs
    networks:
      scientist:
        ipv4_address: 172.28.0.66
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  tensorboard:
    image: python:3.11-slim
    container_name: tensorboard-voice-cu118
    working_dir: /workspace
    command: bash -c "pip install tensorboard && tensorboard --logdir=/runs --host=0.0.0.0 --port=6006"
    ports:
      - "6006:6006"
    volumes:
      - ./workspace:/workspace
      - ./runs:/runs
    networks:
      scientist:
        ipv4_address: 172.28.0.67

networks:
  scientist:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16